<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Safecloud Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#09090b;--surface:#1a1a1f;--raised:#222228;
  --border:#2a2a32;--text:#e8e8ec;--muted:#9898a8;--faint:#686878;
  --green:#00e87b;--green-dim:#00c468;--amber:#e8a020;--red:#e84040;
  --mono:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:var(--sans)}
#player-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:var(--void)}
#status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:.88rem;color:var(--muted);text-align:center;pointer-events:none;
  transition:opacity .3s}
#status.hidden{opacity:0}
#status.error{color:var(--red)}

/* Passphrase modal */
#pass-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:100}
#pass-overlay.hidden{display:none}
#pass-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:32px;max-width:400px;width:90%;text-align:center}
#pass-modal h2{font-size:1.1rem;font-weight:700;margin:0 0 8px}
#pass-modal p{font-size:.85rem;color:var(--muted);margin:0 0 20px}
#pass-input{width:100%;padding:12px 16px;background:var(--raised);color:var(--text);
  border:1px solid var(--border);border-radius:8px;font-family:var(--mono);
  font-size:1.1rem;text-align:center;letter-spacing:.04em;margin-bottom:16px}
#pass-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,232,123,.15)}
#pass-btn{width:100%;padding:10px;background:var(--green);color:var(--void);border:none;
  border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}
#pass-btn:hover{background:var(--green-dim)}
#pass-error{color:var(--red);font-size:.82rem;margin-top:10px;min-height:1.2em}
</style>
</head>
<body>

<div id="player-wrap">
  <video id="video" playsinline></video>
  <div id="status">Initializing…</div>
</div>

<div id="pass-overlay" class="hidden">
  <div id="pass-modal">
    <h2>Passphrase Required</h2>
    <p>This content is protected. Enter the passphrase provided separately.</p>
    <input id="pass-input" type="text" placeholder="word-word-word-word" autocomplete="off" spellcheck="false">
    <button id="pass-btn">Unlock</button>
    <div id="pass-error"></div>
  </div>
</div>

<script src="player.js"></script>
</body>
</html>
